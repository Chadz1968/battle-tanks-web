<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tank Battle (10x10 Turn-Based Prototype)</title>
  <style>
    body { background:#111; color:#eee; font-family:system-ui,Segoe UI,Arial; display:flex; gap:16px; padding:16px; }
    canvas { background:#0b0f14; border:1px solid #2a2f3a; }
    .panel { max-width:360px; line-height:1.35; }
    .kbd { padding:2px 6px; border:1px solid #444; border-radius:6px; background:#1a1f2a; }
    .muted { color:#aab; }
  </style>
</head>
<body>
  <canvas id="c" width="640" height="640"></canvas>
  <div class="panel">
    <h2 style="margin:0 0 8px 0;">Tank Battle (Prototype)</h2>
    <div id="hud" class="muted"></div>
  <button id="restartBtn" style="margin-top:12px">Restart</button>
  <hr style="border:0;border-top:1px solid #2a2f3a;margin:12px 0;">
    <div>
      <div><span class="kbd">W</span>/<span class="kbd">S</span> move forward/back (costs moves)</div>
      <div><span class="kbd">A</span>/<span class="kbd">D</span> rotate hull (free)</div>
      <div><span class="kbd">Q</span>/<span class="kbd">E</span> rotate turret (free)</div>
      <div><span class="kbd">Space</span> shoot (ends turn)</div>
      <div><span class="kbd">Shift</span> end turn</div>
    </div>
    <p class="muted">
      Obstacles are tetrominoes; each tile has HP (3). Shoot them to create holes.
    </p>
  </div>

<script>
(() => {
  const GAME_VERSION = "v0.1";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const hud = document.getElementById("hud");

  const GRID = 10;
  const TILE = 64;
  const OB_HP_MAX = 3;
  const MOVE_MAX = 5;

function resetGame() {
  // Reset board
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      ob[y][x] = 0;
    }
  }

  placeRandomObstacles(7);

  // Reset player
  player.x = 1;
  player.y = 1;
  player.rx = 1;
  player.ry = 1;
  player.facing = 1;
  player.turret = 2;
  player.alive = true;

  // Reset CPU
  cpu.x = 8;
  cpu.y = 8;
  cpu.rx = 8;
  cpu.ry = 8;
  cpu.facing = 3;
  cpu.turret = 6;
  cpu.alive = true;

  // Reset turn state
  state = "PLAYER_TURN";
  movesLeft = MOVE_MAX;
  lastShotTrace = [];
  message = "Your turn.";

  // Reset CPU animation / planning
  cpuPlan = null;
  cpuAnim = null;
}

  // Hull directions (90°): 0=N,1=E,2=S,3=W
const DIR4 = [
  { dx:  0, dy: -1 }, // N
  { dx:  1, dy:  0 }, // E
  { dx:  0, dy:  1 }, // S
  { dx: -1, dy:  0 }, // W
];

// Turret directions (45°): 0=N,1=NE,2=E,3=SE,4=S,5=SW,6=W,7=NW
const DIR8 = [
  { dx:  0, dy: -1 }, // N
  { dx:  1, dy: -1 }, // NE
  { dx:  1, dy:  0 }, // E
  { dx:  1, dy:  1 }, // SE
  { dx:  0, dy:  1 }, // S
  { dx: -1, dy:  1 }, // SW
  { dx: -1, dy:  0 }, // W
  { dx: -1, dy: -1 }, // NW
];

const DIR4_NAMES = ["N","E","S","W"];
const DIR8_NAMES = ["N","NE","E","SE","S","SW","W","NW"];

// Board: obstacle HP per cell (0 means empty)
const ob = Array.from({length:GRID}, () => Array(GRID).fill(0));

const player = { x:1, y:1, rx:1, ry:1, facing:1, turret:2, alive:true, color:"#55d6ff", name:"Player" };
const cpu    = { x:8, y:8, rx:8, ry:8, facing:3, turret:6, alive:true, color:"#ff5b6b", name:"CPU" };

  let state = "PLAYER_TURN"; // PLAYER_TURN | CPU_TURN | GAME_OVER
  let movesLeft = MOVE_MAX;
  let lastShotTrace = []; // cells bullet passed through (for quick visual feedback)
  let message = "Your turn.";

  // --- Tetromino definitions (4 blocks each) ---
  // Each shape is offsets from an anchor. Rotations handled later.
  const TETROS = [
    // I
    [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0}],
    // O
    [{x:0,y:0},{x:1,y:0},{x:0,y:1},{x:1,y:1}],
    // T
    [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:1,y:1}],
    // S
    [{x:1,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1}],
    // Z
    [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:2,y:1}],
    // J
    [{x:0,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1}],
    // L
    [{x:2,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1}],
  ];

  // CPU animation speed per tile (tweak this)
  const CPU_STEP_MS = 160; 
  const lerp = (a,b,t) => a + (b-a)*t;

  // returns normalized vector (dx,dy) with length 1, or {0,0} if input is zero
  function normalized(dx, dy) {
  const len = Math.hypot(dx, dy);
  return len === 0 ? {dx: 0, dy: 0} : {dx: dx / len, dy: dy / len};
}
  
  // { steps: [{x,y,face}], turret:number, willShoot:boolean }
  let cpuPlan = null;

  // { fromX,fromY,toX,toY,start,face }
  let cpuAnim = null;

  function buildCpuPlan() {
  // reset per-turn movement budget
  movesLeft = MOVE_MAX;

  const {dist, prev} = bfsReachable(cpu.x, cpu.y, MOVE_MAX+1);

  let bestKill = null;

  // Can we move somewhere and get a kill shot?
  for (const [k, d] of dist.entries()) {
    if (d > MOVE_MAX) continue;
    const [xStr,yStr] = k.split(",");
    const x = +xStr, y = +yStr;

    for (let tdir=0; tdir<8; tdir++) {
      if (rayHitsTank(x,y,tdir,player)) { bestKill = {x,y,tdir,steps:d}; break; }
    }
    if (bestKill) break;
  }

  let targetCell = null;
  let targetTurret = cpu.turret;

  if (bestKill) {
    targetCell = {x:bestKill.x, y:bestKill.y};
    targetTurret = bestKill.tdir;
  } else {
    // pick a “good” move: closer to player and/or adjacent to cover
    let bestScore = Infinity;
    for (const [k, d] of dist.entries()) {
      if (d > MOVE_MAX) continue;
      const [xStr,yStr] = k.split(",");
      const x = +xStr, y = +yStr;

      const man = Math.abs(x-player.x)+Math.abs(y-player.y);
      let coverAdj = 0;

      for (let dir=0; dir<4; dir++) {
        const nx = x + DIR4[dir].dx, ny = y + DIR4[dir].dy; // IMPORTANT: DIR4 not DIRS
        if (inBounds(nx,ny) && ob[ny][nx] > 0) coverAdj++;
      }

      const score = man - coverAdj*0.75 + d*0.15;
      if (score < bestScore) { bestScore = score; targetCell = {x,y}; }
    }

    // aim turret if aligned
    if (targetCell.x === player.x) targetTurret = (player.y < targetCell.y) ? 0 : 4;
    else if (targetCell.y === player.y) targetTurret = (player.x > targetCell.x) ? 2 : 6;
  }

  // path to target
  const path = reconstructPath(prev, targetCell.x, targetCell.y, cpu.x, cpu.y);

  // Convert path into step list with facing
  const steps = path.slice(0, MOVE_MAX).map(step => {
  const dx = step.x - cpu.x;
  const dy = step.y - cpu.y;
  // NOTE: dx/dy here is relative to ORIGINAL cpu; we’ll compute face later per step
    return {x: step.x, y: step.y};
  });

  return { steps, turret: targetTurret };
}

  function rotate90(p) { return {x: -p.y, y: p.x}; }

  function normalizeOffsets(points) {
    // shift so min x,y become 0,0 (keeps within bounds after rotation)
    let minX = Infinity, minY = Infinity;
    for (const p of points) { minX = Math.min(minX,p.x); minY = Math.min(minY,p.y); }
    return points.map(p => ({x: p.x - minX, y: p.y - minY}));
  }

  function rotated(points, r) {
    let out = points.map(p => ({x:p.x,y:p.y}));
    for (let i=0;i<r;i++) out = out.map(rotate90);
    return normalizeOffsets(out);
  }

  function inBounds(x,y){ return x>=0 && x<GRID && y>=0 && y<GRID; }
  function isTankAt(x,y){
    return (player.alive && player.x===x && player.y===y) || (cpu.alive && cpu.x===x && cpu.y===y);
  }
  function isOccupied(x,y){
    return !inBounds(x,y) || ob[y][x]>0 || isTankAt(x,y);
  }

  function placeRandomObstacles(count=6) {
    let tries = 0;
    let placed = 0;
    while (placed < count && tries < 2000) {
      tries++;
      const base = TETROS[Math.floor(Math.random()*TETROS.length)];
      const r = Math.floor(Math.random()*4);
      const shape = rotated(base, r);
      const ax = Math.floor(Math.random()*GRID);
      const ay = Math.floor(Math.random()*GRID);

      // validate placement
      let ok = true;
      for (const p of shape) {
        const x = ax + p.x, y = ay + p.y;
        if (!inBounds(x,y)) { ok=false; break; }
        if (ob[y][x]>0) { ok=false; break; }
        if ((x===player.x && y===player.y) || (x===cpu.x && y===cpu.y)) { ok=false; break; }
      }
      if (!ok) continue;

      for (const p of shape) {
        const x = ax + p.x, y = ay + p.y;
        ob[y][x] = OB_HP_MAX;
      }
      placed++;
    }
  }

  // --- Movement & rotation ---
  function rotateHull(tank, dirDelta) {
    tank.facing = (tank.facing + dirDelta + 4) % 4;
  }
  function rotateTurret(tank, dirDelta) {
    tank.turret = (tank.turret + dirDelta + 8) % 8;
  }

  function tryMove(tank, forward=true) {
    if (movesLeft <= 0) return false;
    const d = DIR4[tank.facing];
    const dx = forward ? d.dx : -d.dx;
    const dy = forward ? d.dy : -d.dy;
    const nx = tank.x + dx;
    const ny = tank.y + dy;
    if (!inBounds(nx,ny)) return false;
    if (ob[ny][nx] > 0) return false;
    if (isTankAt(nx,ny)) return false;
    tank.x = nx; tank.y = ny;
    tank.rx = tank.x; tank.ry = tank.y;
    movesLeft--;
    return true;
  }

  // --- Shooting ---
  function shoot(fromTank) {
    lastShotTrace = [];
    const d = DIR8[fromTank.turret];
    let x = fromTank.x + d.dx;
    let y = fromTank.y + d.dy;

    while (inBounds(x,y)) {
      lastShotTrace.push({x,y});

      // hit other tank?
      const target = (fromTank === player) ? cpu : player;
      if (target.alive && target.x===x && target.y===y) {
        target.alive = false;
        state = "GAME_OVER";
        message = `${fromTank.name} wins! Direct hit.`;
        return;
      }

      // hit obstacle?
      if (ob[y][x] > 0) {
        ob[y][x]--;
        message = (ob[y][x]===0)
          ? "Shot destroyed an obstacle tile (hole created)."
          : "Shot damaged an obstacle tile.";
        return;
      }

      x += d.dx;
      y += d.dy;
    }
    message = "Shot missed (left the battlefield).";
  }

  // --- CPU AI ---
  function bfsReachable(startX, startY, maxSteps) {
    const key = (x,y)=>`${x},${y}`;
    const q = [{x:startX,y:startY}];
    const dist = new Map([[key(startX,startY),0]]);
    const prev = new Map(); // key -> {px,py}
    while (q.length) {
      const cur = q.shift();
      const cd = dist.get(key(cur.x,cur.y));
      for (let dir=0; dir<4; dir++) {
        const nx = cur.x + DIR4[dir].dx;
        const ny = cur.y + DIR4[dir].dy;
        if (!inBounds(nx,ny)) continue;
        if (ob[ny][nx] > 0) continue;
        if (isTankAt(nx,ny) && !(nx===startX && ny===startY)) continue;

        const nk = key(nx,ny);
        if (dist.has(nk)) continue;
        dist.set(nk, cd+1);
        prev.set(nk, {px:cur.x, py:cur.y});
        if (cd+1 < maxSteps) q.push({x:nx,y:ny});
      }
    }
    return {dist, prev};
  }

  function rayHitsTank(fromX, fromY, turretDir, target) {
    const d = DIR8[turretDir];
    let x = fromX + d.dx;
    let y = fromY + d.dy;
    while (inBounds(x,y)) {
      if (target.alive && target.x===x && target.y===y) return true;
      if (ob[y][x] > 0) return false;
      x += d.dx; y += d.dy;
    }
    return false;
  }

  function rayFirstObstacle(fromX, fromY, turretDir) {
    const d = DIR8[turretDir];
    let x = fromX + d.dx;
    let y = fromY + d.dy;
    while (inBounds(x,y)) {
      if (ob[y][x] > 0) return {x,y};
      if (player.alive && player.x===x && player.y===y) return null;
      x += d.dx; y += d.dy;
    }
    return null;
  }

  function reconstructPath(prev, endX, endY, startX, startY) {
    const key = (x,y)=>`${x},${y}`;
    let cur = {x:endX,y:endY};
    const out = [];
    while (!(cur.x===startX && cur.y===startY)) {
      out.push(cur);
      const p = prev.get(key(cur.x,cur.y));
      if (!p) break;
      cur = {x:p.px, y:p.py};
    }
    out.reverse();
    return out;
  }

  function cpuTakeTurn(now) {
  if (state !== "CPU_TURN") return;
  if (!cpu.alive || !player.alive) return;

  // Build plan once at start of CPU turn
  if (!cpuPlan) {
    message = "CPU thinking...";
    cpuPlan = buildCpuPlan();
    message = "CPU moving...";
  }

  // If we’re currently animating a step, update interpolation
  if (cpuAnim) {
    const t = Math.min(1, (now - cpuAnim.start) / CPU_STEP_MS);
    cpu.rx = lerp(cpuAnim.fromX, cpuAnim.toX, t);
    cpu.ry = lerp(cpuAnim.fromY, cpuAnim.toY, t);

    if (t >= 1) {
      // snap to cell and finish step
      cpu.x = cpuAnim.toX; cpu.y = cpuAnim.toY;
      cpu.rx = cpu.x; cpu.ry = cpu.y;
      cpu.facing = cpuAnim.face;
      movesLeft = Math.max(0, movesLeft - 1);
      cpuAnim = null;
    }
    return; // wait until this step completes
  }

  // No active animation: start next step if any
  if (cpuPlan.steps.length > 0 && movesLeft > 0) {
    const next = cpuPlan.steps.shift();

    const dx = next.x - cpu.x;
    const dy = next.y - cpu.y;

    let face = cpu.facing;
    if (dx === 1) face = 1;
    else if (dx === -1) face = 3;
    else if (dy === 1) face = 2;
    else if (dy === -1) face = 0;

    cpuAnim = {
      fromX: cpu.x, fromY: cpu.y,
      toX: next.x, toY: next.y,
      start: now,
      face
    };
    return;
  }

  // Movement finished: rotate turret + shoot/end
  cpu.turret = cpuPlan.turret;

  if (rayHitsTank(cpu.x, cpu.y, cpu.turret, player)) {
    shoot(cpu);
  } else {
    const block = rayFirstObstacle(cpu.x, cpu.y, cpu.turret);
    if (block) shoot(cpu);
    else message = "CPU ended turn.";
  }

  // cleanup and pass turn back
  cpuPlan = null;
  cpuAnim = null;

  if (state !== "GAME_OVER") {
    state = "PLAYER_TURN";
    movesLeft = MOVE_MAX;
    message = "Your turn.";
  }
}

// --- Input handling ---
window.addEventListener("keydown", (e) => {
  if (state === "GAME_OVER") return;
  if (state !== "PLAYER_TURN") return; // lock input during CPU animation

  const k = e.key.toLowerCase();
  const isShift = (e.key === "Shift");

  if (k === "a") rotateHull(player, -1);
  else if (k === "d") rotateHull(player, +1);
  else if (k === "q") rotateTurret(player, -1); // 45° steps now
  else if (k === "e") rotateTurret(player, +1);
  else if (k === "w") {
    if (!tryMove(player, true)) message = "Blocked or no moves left.";
  }
  else if (k === "s") {
    if (!tryMove(player, false)) message = "Blocked or no moves left.";
  }
  else if (e.code === "Space") {
    lastShotTrace = [];
    shoot(player);
    if (state !== "GAME_OVER") {
      state = "CPU_TURN";
      message = "CPU turn...";
      // reset CPU anim state so CPU starts planning from scratch
      cpuPlan = null;
      cpuAnim = null;
    }
  }
  else if (isShift) {
    state = "CPU_TURN";
    message = "CPU turn...";
    cpuPlan = null;
    cpuAnim = null;
  }

  e.preventDefault();
});

document.getElementById("restartBtn").addEventListener("click", resetGame);

  // --- Rendering ---
  function draw(now) {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // grid
    ctx.strokeStyle = "#1d2330";
    for (let i=0;i<=GRID;i++){
      ctx.beginPath(); ctx.moveTo(i*TILE,0); ctx.lineTo(i*TILE,GRID*TILE); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*TILE); ctx.lineTo(GRID*TILE,i*TILE); ctx.stroke();
    }

    // obstacles
    for (let y=0;y<GRID;y++){
      for (let x=0;x<GRID;x++){
        const hp = ob[y][x];
        if (hp<=0) continue;
        const t = hp/OB_HP_MAX;
        // darker when damaged
        const col = `rgb(${Math.floor(90+60*t)},${Math.floor(120+50*t)},${Math.floor(90+60*t)})`;
        ctx.fillStyle = col;
        ctx.fillRect(x*TILE+6, y*TILE+6, TILE-12, TILE-12);

        // HP pips
        ctx.fillStyle = "#0b0f14";
        for (let i=0;i<hp;i++){
          ctx.fillRect(x*TILE+10+i*10, y*TILE+10, 6, 6);
        }
      }
    }

    // shot trace
    for (const cell of lastShotTrace) {
      ctx.fillStyle = "rgba(255,255,100,0.35)";
      ctx.fillRect(cell.x*TILE+2, cell.y*TILE+2, TILE-4, TILE-4);
    }

    function drawTank(t) {
      if (!t.alive) return;
      const drawX = (t.rx ?? t.x);
      const drawY = (t.ry ?? t.y);

      ctx.fillStyle = t.color;
      ctx.fillRect(drawX*TILE+10, drawY*TILE+10, TILE-20, TILE-20);

      const cx = drawX*TILE + TILE/2;
      const cy = drawY*TILE + TILE/2;

      // hull direction arrow
      const fd = DIR4[t.facing];
      ctx.strokeStyle = "#001018";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx + fd.dx*18, cy + fd.dy*18);
      ctx.stroke();

      // turret direction line
      const td = DIR8[t.turret];
      const n = normalized(td.dx, td.dy);
      const TURRET_LEN = 26;

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(
        cx + n.dx * TURRET_LEN,
        cy + n.dy * TURRET_LEN
      );
      ctx.stroke();

      // outline
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 2;
      ctx.strokeRect(t.x*TILE+10, t.y*TILE+10, TILE-20, TILE-20);
    }

    drawTank(player);
    drawTank(cpu);

    // HUD
    const turnName = (state==="PLAYER_TURN") ? "PLAYER" : (state==="CPU_TURN" ? "CPU" : "GAME OVER");
    hud.innerHTML =
      `<div><b>Turn:</b> ${turnName}</div>` +
      `<div><b>Moves left:</b> ${movesLeft}</div>` +
      `<div><b>Player hull/turret:</b> ${DIR4_NAMES[player.facing]} / ${DIR8_NAMES[player.turret]}</div>` +
      `<div><b>CPU hull/turret:</b> ${DIR4_NAMES[cpu.facing]} / ${DIR8_NAMES[cpu.turret]}</div>` +
      `<div style="margin-top:8px;"><b>Status:</b> ${message}</div>` +
      `<div class="muted" style="margin-top:6px;">Version ${GAME_VERSION}</div>`;

    
    if (state === "CPU_TURN" && cpu.alive && player.alive) {
    cpuTakeTurn(now);
}


      requestAnimationFrame(draw);
  }

  // --- Init ---
  placeRandomObstacles(7);
  requestAnimationFrame(draw);

  

})();
</script>
</body>
</html>
``
